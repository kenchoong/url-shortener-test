services:
  courtside-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: courtside-backend:latest
    ports:
      - "3352:3001"
    environment:
      PORT: 3001
      DATA_FILE_PATH: /app/data/store.json
      PERSIST_INTERVAL: 10
    volumes:
      - ./data:/app/data
    restart: unless-stopped
